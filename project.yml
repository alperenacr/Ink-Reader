name: Inkread

options:
  bundleIdPrefix: com.alperenacar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: "YES"

targets:
  Inkread:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Inkread
    dependencies:
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alperenacar.inkread
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Inkread/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: PDF Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.idpf.epub-container
            UTTypeDescription: EPUB Document
            UTTypeConformsTo:
              - public.data
              - public.composite-content
            UTTypeTagSpecification:
              "public.filename-extension":
                - epub
              "public.mime-type":
                - application/epub+zip
